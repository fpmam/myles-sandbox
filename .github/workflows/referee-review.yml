name: Claude Referee Review

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  referee-review:
    name: referee-review
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for deterministic and CI checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/wait_for_check_runs.py \
            --repo "${{ github.repository }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --required-check pytest \
            --required-check deterministic-plan-gate \
            --required-check deterministic-pr-gate

      - name: Run Claude Referee
        env:
          ANTHROPIC_MYLES_API_KEY: ${{ secrets.ANTHROPIC_MYLES_API_KEY }}
        run: |
          python scripts/run_referee_review.py \
            --pr-number "${{ github.event.pull_request.number }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --output-path ".artifacts/referee-verdict.json"

      - name: Upload referee verdict
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: referee-verdict
          path: .artifacts/
          if-no-files-found: error
          include-hidden-files: true
